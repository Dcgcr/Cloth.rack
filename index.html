<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DC Clothes Rack</title>

  <!-- ESM imports (supabase + helper libs) -->
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.36.0",
      "dayjs": "https://esm.sh/dayjs@1.11.7"
    }
  }
  </script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Intro white splash -->
  <div id="splash" class="screen white-screen"> </div>

  <!-- Main app (hidden until splash completes) -->
  <div id="app" class="screen hidden">
    <!-- Top 9:1 bar -->
    <div id="topBar" class="top-bar">
      <div id="topBarText">DonCour Cloth Racks</div>
    </div>

    <!-- Scrollable content region with cards (9:9 each) -->
    <main id="feed" class="feed"></main>
  </div>

  <!-- floating circular overlay for AI.jpg (appears on main feed) -->
  <div id="floatingCircle" class="floating-circle" aria-hidden="false">
    <img src="Ai.jpg" alt="AI" />
  </div>

    <!-- Bottom fixed 9:1 control bar divided into three parts: D, +, P -->
    <div id="bottomBar" class="bottom-bar" aria-hidden="false">
      <div class="bottom-inner">
        <button id="dBtn" class="bottom-btn bottom-seg" aria-label="D">D</button>
        <button id="plusBtn" class="bottom-btn bottom-seg" aria-label="+">+</button>
        <!-- Chat button is hidden by default and revealed after user clicks "Grab This" -->
        <button id="chatBtn" class="bottom-btn bottom-seg hidden" aria-label="Chat">🗨️</button>
        <button id="pBtn" class="bottom-btn bottom-seg" aria-label="Search">🔎</button>
      </div>
    </div>

  <!-- Upload screen (white) -->
  <div id="uploadScreen" class="screen white-screen hidden upload-screen">
    <div class="upload-header">upload</div>

    <div class="upload-center">
      <div id="uploadBox" class="upload-box">
        <input id="fileInput" type="file" accept="image/*" style="display:none" />
        <div id="uploadPreview" class="upload-preview">Click to choose</div>
      </div>

      <input id="captionInput" class="caption-input" placeholder="Add caption..." maxlength="200" />

      <button id="confirmBtn" class="confirm-btn hidden">confirm</button>
      <div id="uploadStatus" class="upload-status"></div>
    </div>
  </div>

  <!-- Search screen (white) -->
  <div id="searchScreen" class="screen white-screen hidden search-screen">
    <!-- top 9:1 bar with editable region -->
    <div id="searchTopBar" class="top-bar search-topbar">
      <input id="searchInput" class="search-input" placeholder="Type to Filter up results" />
    </div>

    <!-- feed area reused -->
    <main id="searchFeed" class="feed"></main>
  </div>

  <!-- Fullscreen viewer modal -->
  <div id="fullView" class="fullview hidden" aria-hidden="true">
    <button id="fullBack" class="full-back" aria-label="Back">⟨</button>

    <!-- shopping cart button positioned center-right of the full view -->
    <button id="fullCartBtn" class="full-cart-btn" aria-label="Add to cart" title="Add to cart">
      🛒
    </button>

    <div class="full-image-wrap">
      <img id="fullImg" src="" alt="full view" />
      <div id="fullCaption" class="full-caption"></div>
    </div>
    <button id="saveBtn" class="save-btn">Save</button>
  </div>

  <!-- Cart screen (white) shown when + is clicked -->
  <div id="cartScreen" class="screen white-screen hidden cart-screen">
    <div class="top-bar">
      <div style="width:100%;padding:0 14px;font-weight:600;">Your Cart</div>
    </div>
    <main id="cartFeed" class="feed"></main>
  </div>

  <!-- Admin Portal screen (revealed by gesture) -->
  <div id="adminScreen" class="screen white-screen hidden admin-screen">
    <div class="admin-topbar top-bar">
      <div style="width:100%;text-align:center;font-weight:700;">Portal 21051</div>
    </div>

    <div class="admin-tabs" style="display:flex; gap:8px; padding:12px;">
      <button id="adminUploadTab" class="admin-tab" style="flex:1;padding:10px;border-radius:8px;border:1px solid #eee;background:#fff;font-weight:700;">Upload</button>
      <button id="adminMessagesTab" class="admin-tab" style="flex:1;padding:10px;border-radius:8px;border:1px solid #eee;background:#fff;font-weight:700;">Messages</button>
    </div>

    <div id="adminContent" style="flex:1;overflow:auto;padding:12px;">
      <!-- Upload view (reuses existing upload UI) -->
      <div id="adminUploadView" class="admin-view">
        <!-- reuse upload UI from uploadScreen by reference -->
        <div style="padding:12px;color:var(--muted)">Use the Upload tab to add images to the collection.</div>
      </div>

      <!-- Messages view -->
      <div id="adminMessagesView" class="admin-view hidden">
        <div style="text-align:center;font-weight:700;margin-bottom:12px;">Messages</div>
        <div id="adminContacts" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>
    </div>

    <button id="adminClose" class="full-back" style="left:12px;top:12px;position:absolute;">⟨</button>
  </div>

  <!-- Portal screen (opened from Grab This) -->
  <div id="portalScreen" class="screen white-screen hidden portal-screen">
    <button id="portalBack" class="full-back" aria-label="Back">⟨</button>
    <div class="portal-topbar top-bar">
      <div style="width:100%;text-align:center;font-weight:700;">Portal 21051</div>
    </div>

    <!-- messages area: messages will appear pinned top-right under the top bar -->
    <div id="portalMessages" class="portal-messages" aria-live="polite"></div>

    <!-- bottom curved 9:1 input similar to Filo -->
    <div id="portalBottom" class="filo-bottom-bar">
      <div class="filo-input-wrap">
        <input id="portalInput" class="filo-input" placeholder="Type to send to Portal" />
        <button id="portalSend" class="filo-send" aria-label="Send" hidden>↗️</button>
      </div>
    </div>
  </div>

  <!-- Filo AI screen (opened from floating circle) -->
  <div id="filoScreen" class="screen white-screen hidden filo-screen">
    <button id="filoBack" class="full-back" aria-label="Back">⟨</button>
    <div class="filo-title">Filo Ai</div>

    <div id="filoChat" class="filo-chat"></div>

    <!-- bottom curved 9:1 input bar (not the global bottom bar) -->
    <div id="filoBottom" class="filo-bottom-bar">
      <div class="filo-input-wrap">
        <input id="filoInput" class="filo-input" placeholder="Ask Filo" />
        <button id="filoSend" class="filo-send" aria-label="Send" hidden>↗️</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
